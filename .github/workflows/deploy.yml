name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_ROBOT_IP_BASE: ${{ secrets.NEXT_PUBLIC_ROBOT_IP_BASE }}
          NEXT_PUBLIC_SYSTEM_AUTO_CONNECT: ${{ secrets.NEXT_PUBLIC_SYSTEM_AUTO_CONNECT }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
